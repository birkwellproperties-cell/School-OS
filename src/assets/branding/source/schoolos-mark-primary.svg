<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">SchoolOS brand mark</title>
  <desc id="desc">A shield containing a graduation cap and open book, crowned by a gold star and framed by laurel branches.</desc>

  <defs>
    <linearGradient id="shieldBlue" x1="40" y1="24" x2="210" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="bookBlue" x1="78" y1="133" x2="178" y2="205" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D1B2A"/>
      <stop offset="1" stop-color="#153B73"/>
    </linearGradient>
  </defs>

  <!-- Shield outer edge -->
  <path
    d="M128 22C104 45 79 52 48 62v54c0 58 31 96 80 122 49-26 80-64 80-122V62c-31-10-56-17-80-40Z"
    fill="#0D1B2A"
  />

  <!-- Shield blue border -->
  <path
    d="M128 31C106 51 82 59 58 67v49c0 51 27 85 70 109 43-24 70-58 70-109V67c-24-8-48-16-70-36Z"
    fill="url(#shieldBlue)"
  />

  <!-- Shield white field -->
