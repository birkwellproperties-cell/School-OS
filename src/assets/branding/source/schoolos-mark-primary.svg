    <path d="M45 145c-11-7-15-17-13-28 10 5 16 14 13 28Z"/>
    <path d="M39 165c-13-4-20-12-21-23 12 2 20 10 21 23Z"/>
    <path d="M42 185c-14 0-23-6-28-16 12-2 23 4 28 16Z"/>
    <path d="M51 204c-13 4-24 1-31-8 11-5 23-2 31 8Z"/>
    <path d="M65 220c-11 7-22 7-32 1 9-8 21-8 32-1Z"/>
    <path d="M58 154c2-13 9-22 20-26 1 12-6 22-20 26Z"/>
    <path d="M56 176c5-13 13-20 25-21-2 12-10 20-25 21Z"/>
    <path d="M63 197c7-11 17-17 29-15-4 11-14 17-29 15Z"/>
