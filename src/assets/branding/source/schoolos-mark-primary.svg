  <path d="M99 114v17c17 12 41 12 58 0v-17l-29 14-29-14Z" fill="#153B73"/>
  <path d="M174 105v22" stroke="#0D1B2A" stroke-width="5" stroke-linecap="round"/>
  <circle cx="174" cy="130" r="4" fill="#F59E0B"/>

  <!-- Open book -->
  <path
    d="M78 138c21-5 37 3 50 15v53c-13-13-30-19-50-14v-54Z"
    fill="url(#bookBlue)"
  />
  <path
    d="M178 138c-21-5-37 3-50 15v53c13-13 30-19 50-14v-54Z"
